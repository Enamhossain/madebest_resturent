<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MadeBest Restaurant - Delicious food delivery and restaurant booking platform" />
    <meta name="keywords" content="restaurant, food delivery, booking, madebest" />
    <meta name="author" content="MadeBest Restaurant" />
    
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://madebestresturent.vercel.app" />
    <link rel="preconnect" href="https://i.ibb.co" crossorigin />
    <link rel="dns-prefetch" href="https://madebestresturent.vercel.app" />
    <link rel="dns-prefetch" href="https://i.ibb.co" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Preload/modulepreload for source files removed to avoid MIME/404 in production -->
    <!-- Vite will manage built asset links during build -->
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#f97316" />
    
    <!-- Apple specific meta tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MadeBest" />
    
    <!-- Performance and security meta tags -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Critical CSS inline for faster rendering -->
    <style>
      /* Critical CSS for initial render */
      html { scroll-behavior: smooth; }
      body { 
        margin: 0; 
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      .loading { 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh;
        background: linear-gradient(135deg, #ffedd5 0%, #fed7aa 100%);
      }
      /* Beautiful Spinner - Optimized */
      .loading-container {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .spinner-ring {
        width: 80px;
        height: 80px;
        border: 4px solid #fed7aa;
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        will-change: transform;
        transform: translateZ(0); /* GPU acceleration */
      }
      .spinner-ring-inner {
        position: absolute;
        width: 48px;
        height: 48px;
        border: 4px solid #fbbf24;
        border-right-color: #f59e0b;
        border-radius: 50%;
        animation: spin-reverse 0.8s linear infinite;
        will-change: transform;
        transform: translateZ(0); /* GPU acceleration */
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes spin-reverse {
        to { transform: rotate(-360deg); }
      }
      .loading-content {
        margin-top: 32px;
        text-align: center;
      }
      .loading-title {
        font-size: 24px;
        font-weight: bold;
        color: #ea580c;
        margin: 0;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .loading-subtitle {
        font-size: 14px;
        color: #78716c;
        margin: 8px 0 0 0;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      /* Prevent layout shift */
      img { max-width: 100%; height: auto; }
    </style>
    
    <title>MadeBest Restaurant | Gourmet Dining & Exclusive Experiences</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Indulge in culinary excellence at MadeBest Restaurant. We offer gourmet dining, private dining experiences, and professional corporate catering in Dhaka." />
    <meta name="keywords" content="gourmet restaurant dhaka, private dining dhaka, corporate catering, best food delivery dhaka, madebest restaurant" />
    <meta name="image" content="https://i.ibb.co/VNs4X6g/1705932001959oh7xa24u-removebg-preview.png" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://madebestresturent.vercel.app/" />
    <meta property="og:title" content="MadeBest Restaurant | Gourmet Dining" />
    <meta property="og:description" content="Experience the art of fire-grilled perfection and artisan culinary delights." />
    <meta property="og:image" content="https://i.ibb.co/VNs4X6g/1705932001959oh7xa24u-removebg-preview.png" />
    
    <!-- JSON-LD Structured Data - Restaurant Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "MadeBest Restaurant",
        "image": "https://i.ibb.co/nDDwsw0/flame-grilled-meat-cooking-flames-generative-ai.jpg",
        "@id": "https://madebestresturent.vercel.app/",
        "url": "https://madebestresturent.vercel.app/",
        "telephone": "+880182233499",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "768 Gulsan Market, Mirpur",
          "addressLocality": "Dhaka",
          "postalCode": "1280",
          "addressCountry": "BD"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 23.8103,
          "longitude": 90.4125
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"],
            "opens": "11:00",
            "closes": "23:00"
          }
        ],
        "menu": "https://madebestresturent.vercel.app/ourmenu",
        "servesCuisine": ["International", "Italian", "Barbecue"],
        "priceRange": "$$"
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Beautiful Loading Spinner -->
      <div class="loading">
        <div class="loading-container">
          <div class="spinner-ring"></div>
          <div class="spinner-ring-inner"></div>
          <div class="loading-content">
            <h2 class="loading-title">MadeBest</h2>
            <p class="loading-subtitle">Loading delicious experience...</p>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Service Worker Registration - Optimized -->
    <script>
      if ('serviceWorker' in navigator) {
        // Register immediately, don't wait for load
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
          .then((registration) => {
            // Check for updates periodically
            setInterval(() => {
              registration.update();
            }, 60 * 60 * 1000); // Check every hour
          })
          .catch(() => {
            // Silent fail - service worker is optional
          });
      }
      
      // Preload critical resources
      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          const link = document.createElement('link');
          link.rel = 'prefetch';
          link.href = '/ourmenu';
          document.head.appendChild(link);
        });
      }
    </script>
  </body>
</html>
